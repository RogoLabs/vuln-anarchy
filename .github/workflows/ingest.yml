name: Ingest & Compute Drift

on:
  schedule:
    - cron: "0 2 * * *"  # Daily at 02:00 UTC
  workflow_dispatch:       # Allow manual runs

permissions:
  contents: write   # Commit updated JSON back to repo
  pages: write      # Deploy to GitHub Pages
  id-token: write   # OIDC token for Pages deployment

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Ingest NVD
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python scripts/ingest_nvd.py

      - name: Ingest GitHub Advisory Database
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ingest_github.py

      - name: Compute Drift Scores
        run: python scripts/compute_drift.py

      - name: Build Indexes
        run: python scripts/build_indexes.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily ingest $(date -u '+%Y-%m-%d')"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: docs/

  deploy:
    needs: ingest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
